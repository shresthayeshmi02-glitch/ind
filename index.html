<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Poppins',sans-serif;
cursor:url('https://cur.cursors-4u.net/nature/nat-10/nat972.cur'),auto;

background:linear-gradient(
135deg,
#fff0f5,
#f8e8ff,
#eaf4ff,
#fff8e7
);
}

body::before{
content:"";
position:absolute;
width:450px;
height:450px;
background:#ffd6e7;
border-radius:50%;
top:-150px;
left:-120px;
filter:blur(90px);
opacity:.6;
}

body::after{
content:"";
position:absolute;
width:450px;
height:450px;
background:#d8c8ff;
border-radius:50%;
bottom:-150px;
right:-120px;
filter:blur(90px);
opacity:.6;
}

h1{
font-size:4rem;
color:#ff6b9d;
text-align:center;
margin-bottom:20px;
z-index:2;
}

.sub{
font-size:1.2rem;
color:#6f6485;
margin-bottom:25px;
z-index:2;
}

.cake{
font-size:180px;
text-decoration:none;
z-index:2;
transition:.3s;
cursor:pointer;
}

.cake:hover{
transform:scale(1.1) rotate(5deg);
}

.click{
font-size:1.8rem;
font-weight:600;
color:#ff6b9d;
z-index:2;
}

.emoji{
position:absolute;
font-size:2rem;
animation:float 12s linear infinite;
}

@keyframes float{
0%{
transform:translateY(120vh);
}
100%{
transform:translateY(-120px);
}
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>
<p class="sub">A special surprise is waiting for you ✨</p>

<a href="gallery.html" class="cake">🎂</a>

<p class="click">Click The Cake 💖</p>

<div class="emoji" style="left:5%;animation-delay:0s;">😘</div>
<div class="emoji" style="left:15%;animation-delay:3s;">🥳</div>
<div class="emoji" style="left:25%;animation-delay:1s;">🎁</div>
<div class="emoji" style="left:35%;animation-delay:5s;">✨</div>
<div class="emoji" style="left:45%;animation-delay:2s;">💖</div>
<div class="emoji" style="left:55%;animation-delay:6s;">🌸</div>
<div class="emoji" style="left:65%;animation-delay:4s;">🎀</div>
<div class="emoji" style="left:75%;animation-delay:2s;">🧁</div>
<div class="emoji" style="left:85%;animation-delay:5s;">💕</div>
<div class="emoji" style="left:95%;animation-delay:1s;">😋</div>

</body>
</html>
